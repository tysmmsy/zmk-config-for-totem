parse_config:
  zmk_additional_includes:
    - "modules/zmk/helpers/include"

  zmk_preamble: |
    #include <zmk-helpers/key-labels/34.h>
    #define CONFIG_WIRELESS

  raw_binding_map:
    "&sys_reset": Reset
    "&bootloader": Boot
    "&caps_word": Caps Word
    "&rst_boot": Reset Bootloader

    "&bt BT_SEL 0": BT 1
    "&bt BT_SEL 1": BT 2
    "&bt BT_SEL 2": BT 3
    "&bt BT_SEL 3": BT 4

    "&kp LC(INS)": Copy
    "&kp LS(INS)": Paste
    
    "&kp LC(C)": Copy
    "&kp LC(X)": Cut
    "&kp LC(V)": Paste
    "&kp LC(Z)": Undo
    "&kp LC(Y)": Redo
    "&kp LC(A)": All

    "&kp LG(C)": Copy
    "&kp LG(X)": Cut
    "&kp LG(V)": Paste
    "&kp LG(Z)": Undo
    "&kp LG(LS(Z))": Redo
    "&kp LG(A)": All

    "&kp LG(LC(LEFT))": Prev Desk
    "&kp LG(LC(RIGHT))": Next Desk
    '&kp LC(TAB)': Tab Right
    '&kp LA(TAB)': Win Right
    '&kp LS(TAB)': SW ←
    '&kp LA(F4)': Win Close
    '&kp LC(F4)': Tab Close

    '&kp LG(TAB)': Win Right
    '&kp LG(Q)': Win Close
    '&kp LG(W)': Tab Close

    '&sw_c': Tab Right
    '&sw_a': Win Right
    '&sw_g': Win Right

    "&mmv MOVE_UP": Mouse ↑
    "&mmv MOVE_DOWN": Mouse ↓
    "&mmv MOVE_LEFT": Mouse ←
    "&mmv MOVE_RIGHT": Mouse →

    "&msc SCRL_UP": Scroll ↑
    "&msc SCRL_DOWN": Scroll ↓
    "&msc SCRL_LEFT": Scroll ←
    "&msc SCRL_RIGHT": Scroll →

    "&mkp LCLK": Left Click
    "&mkp RCLK": Right Click
    "&mkp MCLK": Middle Click
    "&mkp MB4": Back Click
    "&mkp MB5": Forward Click

    "&kp LC(D)": Del
    "&kp LC(DEL)": Wrd Del
    "&kp LA(DEL)": Wrd Del
    "&kp LC(BSPC)": Wrd Bspc
    "&kp LA(BSPC)": Wrd Bspc

    "&kp LC(D)": Del
    "&kp LG(LEFT)": Home
    "&kp LG(RIGHT)": End
    "&kp LC(HOME)": Doc Str
    "&kp LC(END)": Doc End
    "&kp LG(UP)": Doc Str
    "&kp LG(DOWN)": Doc End

    '&kp LG(L)': Lock
    '&kp LC(LG(Q))': Lock
    '&sleep': Sleep
    '&soft_off': BAT Save
    '&studio_unlock': Studio Unlock
    '&ind_con': Conn status
    '&ind_bat': Batt level

    '&kp KP_PLUS': KP+
    '&kp KP_MINUS': KP-
    '&kp KP_MULTIPLY': KP*
    '&kp KP_DIVIDE': KP/
    '&kp KP_DOT': KP.
    
  trans_legend: { "t": "", "type": "trans" }

  zmk_combos:
    combo_star:   {align: top}
    combo_star_n:   {align: top, o: 0.5}
    
  zmk_keycode_map:
    # custom mappings
    LALT: Alt
    RALT: Alt
    LCTRL: Ctrl
    RCTRL: Ctrl
    LGUI: Gui
    RGUI: Gui
    LSHFT: Shift
    RSHFT: Shift

    BSPC: Bspc
    DEL: Del
    ESC: Esc
    RET: Enter
    SPACE: Spc
    TAB: Tab

    PG_UP: PgUp
    PG_DN: PgDn
    INS: Ins
    HOME: Home
    END: End

    UP: ↑
    DOWN: ↓
    LEFT: ←
    RIGHT: →

    C_MUTE: $$mdi:volume-off$$
    C_PP: $$mdi:play-pause$$
    C_VOL_UP: $$mdi:volume-high$$
    C_VOL_DN: $$mdi:volume-medium$$
    C_NEXT: $$mdi:skip-forward$$
    C_PREV: $$mdi:skip-backward$$

    # defaults
    AMPERSAND: "&"
    AMPS: "&"
    APOS: "'"
    APOSTROPHE: "'"
    ASTERISK: "*"
    ASTRK: "*"
    AT: "@"
    AT_SIGN: "@"
    BACKSLASH: \
    BSLH: \
    CARET: ^
    COLON: ":"
    COMMA: ","
    DLLR: $
    DOLLAR: $
    DOT: .
    DOUBLE_QUOTES: '"'
    DQT: '"'
    EQUAL: "="
    EXCL: "!"
    EXCLAMATION: "!"
    FSLH: /
    GRAVE: "`"
    GREATER_THAN: ">"
    GT: ">"
    HASH: "#"
    LBKT: "["
    LBRC: "{"
    LEFT_BRACE: "{"
    LEFT_BRACKET: "["
    LEFT_PARENTHESIS: (
    LESS_THAN: <
    LPAR: (
    LT: <
    MINUS: "-"
    NON_US_BACKSLASH: \
    NON_US_BSLH: "|"
    NON_US_HASH: "#"
    NUHS: "#"
    PERCENT: "%"
    PERIOD: .
    PIPE: "|"
    PIPE2: "|"
    PLUS: +
    POUND: "#"
    PRCNT: "%"
    QMARK: "?"
    QUESTION: "?"
    RBKT: "]"
    RBRC: "}"
    RIGHT_BRACE: "}"
    RIGHT_BRACKET: "]"
    RIGHT_PARENTHESIS: )
    RPAR: )
    SEMI: ;
    SEMICOLON: ;
    SINGLE_QUOTE: "'"
    SLASH: /
    SQT: "'"
    STAR: "*"
    TILDE: "~"
    TILDE2: "~"
    UNDER: _
    UNDERSCORE: _

draw_config:
  append_colon_to_layer_header: false
  dark_mode: auto
  footer_text: "void0x00/zmk-config"
